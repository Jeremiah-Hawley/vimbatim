name: Beta build

# closed_beta_plan.md §2: manually triggered per beta round, not on every
# push, so testers only see deliberately-cut builds. Artifacts from a
# workflow run are only visible to repo collaborators — that's what keeps
# this "not a public GitHub Release" while still using free native build
# machines for both OSes (GPUI's Metal/DirectX backends can't be
# cross-compiled from Linux).
on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Build (release)
        run: cargo build --release

      # ── macOS: cargo-bundle .app, wrapped in a .dmg ─────────────────────
      - name: Install cargo-bundle
        if: runner.os == 'macOS'
        run: cargo install cargo-bundle

      - name: Bundle .app
        if: runner.os == 'macOS'
        # --format osx: cargo-bundle otherwise also builds its own .dmg by
        # default, which we don't use (our own .dmg below adds
        # FIRST_LAUNCH.txt alongside the .app, which cargo-bundle's doesn't).
        # settings.conf lands in Contents/Resources/ via [package.metadata.
        # bundle].resources in Cargo.toml — cargo-bundle creates that
        # directory itself, unlike a manual cp into a bundle it just built.
        run: cargo bundle --release --format osx

      - name: Create .dmg
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist/dmg-staging
          cp -R "target/release/bundle/osx/Vimbatim.app" dist/dmg-staging/
          cp FIRST_LAUNCH.txt "dist/dmg-staging/First Launch - Read Me.txt"
          hdiutil create -volname "Vimbatim" -srcfolder "dist/dmg-staging" \
            -ov -format UDZO "dist/Vimbatim-macOS.dmg"

      - uses: actions/upload-artifact@v4
        if: runner.os == 'macOS'
        with:
          name: vimbatim-macos
          path: dist/Vimbatim-macOS.dmg

      # ── Windows: plain .zip (exe + settings.conf + a First Launch doc) ──
      - name: Assemble zip contents
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist/Vimbatim-Windows
          cp target/release/vimbatim.exe dist/Vimbatim-Windows/
          cp settings.conf dist/Vimbatim-Windows/
          cp FIRST_LAUNCH.txt dist/Vimbatim-Windows/README.txt

      - name: Zip
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd dist
          7z a Vimbatim-Windows.zip Vimbatim-Windows

      - uses: actions/upload-artifact@v4
        if: runner.os == 'Windows'
        with:
          name: vimbatim-windows
          path: dist/Vimbatim-Windows.zip
